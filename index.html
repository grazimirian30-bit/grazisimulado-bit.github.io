<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Central de Simulados</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Segoe UI', Arial, sans-serif;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:#e2e8f0;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 22px;
  background:#020617;
}

.header h2{
  color:#38bdf8;
}

/* CONTAINER */
.content{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* LADO A LADO FIXO */
.materias{
  display:flex;
  gap:12px;
}

/* BLOCO */
.box{
  width:50%;
  background:rgba(255,255,255,.04);
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  display:flex;
  flex-direction:column;
}

/* IMAGEM (SEM CORTAR) */
.box img{
  width:100%;
  height:285px;
  object-fit:contain;
  background:#020617;
}

/* TÍTULO */
.box h2{
  padding:12px;
  color:#38bdf8;
  font-size:16px;
}

/* LISTA */
.lista{
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  max-height:420px;
  overflow-y:auto;
}

/* CARD */
.card{
  background:rgba(255,255,255,.05);
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  background:rgba(56,189,248,.15);
}
</style>

</head>

<body>

<header class="header">
  <h2>Central de Simulados</h2>
</header>

<div class="content">
