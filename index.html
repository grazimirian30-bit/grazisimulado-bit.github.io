<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Central de Simulados</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg,#0f172a,#1aa3a3);
      margin:0;
      color:#e2e8f0;
    }

    /* ===== HERO (mídia inicial) ===== */
    .hero{
      text-align:center;
      padding:60px 20px 40px;
    }

    .hero img{
      width:120px;
      height:120px;
      object-fit:cover;
      border-radius:50%;
      box-shadow:0 10px 30px rgba(0,0,0,.4);
      margin-bottom:20px;
    }

    .hero h1{
      margin:0;
      font-size:32px;
      color:#38bdf8;
    }

    .hero p{
      opacity:.85;
      margin-top:8px;
    }

    /* ===== GRID ===== */
    .container{
      max-width:1100px;
      margin:auto;
      padding:20px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:24px;
    }

    /* ===== CARD ===== */
    .box{
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius:20px;
      padding:32px 24px;
      box-shadow:0 20px 45px rgba(0,0,0,.35);
      text-align:center;
      transition:.3s ease;
      border:1px solid rgba(255,255,255,0.12);
    }

    .box:hover{
      transform: translateY(-8px) scale(1.01);
      box-shadow:0 30px 60px rgba(0,0,0,.45);
    }

    .box h2{
      margin-top:0;
      color:#7dd3fc;
      font-size:22px;
    }

    /* ===== BOTÃO ===== */
    button{
      display:block;
      width:100%;
      margin:12px auto;
      padding:14px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#c9c547,#d0d545);
      color:#0f172a;
      cursor:pointer;
      font-weight:bold;
      font-size:15px;
      transition:.25s ease;
    }

    button:hover{
      transform:scale(1.05);
      filter:brightness(1.05);
    }

    footer{
      text-align:center;
      padding:30px 20px 40px;
      opacity:.6;
      font-size:14px;
    }
  </style>
</head>

<body>

  <!-- ===== MÍDIA INICIAL ===== -->
  <section class="hero">
    <!-- 🔁 você pode trocar a imagem -->
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" alt="Logo estudos">
    <h1>Central de Simulados</h1>
    <p>Escolha um módulo e comece a praticar 🚀</p>
  </section>

  <!-- ===== CARDS ===== -->
  <div class="container">

    <div class="box">
      <h2>📚 Ética e Cidadania</h2>
      <button onclick="irPara('simulado1.html')">▶️ Abrir Simulado 1</button>
      <button onclick="irPara('simulado2.html')">▶️ Abrir Simulado 2</button>
    </div>

    <div class="box">
      <h2>📚 Engenharia de Software</h2>
      <button onclick="irPara('simulado1engenharia.html')">▶️ Simulado Engenharia 1</button>
      <button onclick="irPara('simulado2engenharia.html')">▶️ Simulado Engenharia 2</button>
      <button onclick="irPara('resumoengenharia1.html')">📖 Central PRO Engenharia</button>
    </div>

    <div class="box">
      <h2>🧪 Prova Oficial</h2>
      <button onclick="irPara('prova_engenharia2.html')">
        ▶️ Prova e Gabarito Engenharia de Software Módulo 2 (USF)
      </button>
    </div>

  </div>

  <footer>
    © Central de Estudos • Engenharia de Requisitos
  </footer>

  <script>
    function irPara(pagina){
      window.location.href = pagina;
    }
  </script>

</body>
</html>
